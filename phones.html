<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ספר טלפונים · מעלה עמוס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<main>

<h1><i class="bi bi-telephone" style="margin-left:8px"></i> ספר טלפונים</h1>
<p class="muted">חיפוש בקרב חברי הקהילה</p>

<div class="card mb-3">
  <div class="form-group">
    <input type="search" id="phone-search" placeholder="חיפוש לפי שם או טלפון..." autofocus>
  </div>
  <div id="phone-stats" class="muted"></div>
</div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>שם</th>
          <th>טלפון</th>
          <th>WhatsApp</th>
        </tr>
      </thead>
      <tbody id="phone-tbody">
        <tr><td colspan="3" class="text-center muted">טוען...</td></tr>
      </tbody>
    </table>
  </div>
</div>

</main>

<script src="assets/js/common.js"></script>
<script>
const KEY_MAP = {
  name: ['n', 'name', 'שם'],
  phone: ['p', 'phone', 'טלפון'],
  whatsapp: ['w', 'wp', 'whatsapp'],
  address: ['a', 'address', 'כתובת'],
};
function val(obj, group) {
  for (const k of KEY_MAP[group]) if (obj[k] != null) return obj[k];
  return '';
}

let ALL = [];

function render(list) {
  const tb = document.getElementById('phone-tbody');
  tb.innerHTML = '';
  if (!list.length) { tb.innerHTML = '<tr><td colspan="3" class="text-center muted">לא נמצאו תוצאות</td></tr>'; return; }
  list.slice(0, 200).forEach(p => {
    const name = MA.escape(val(p, 'name'));
    const phone = String(val(p, 'phone') || '').trim();
    const wa = String(val(p, 'whatsapp') || phone || '').trim();
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${name}</td>
      <td>${phone ? `<a href="tel:${phone}"><i class="bi bi-telephone-fill" style="color:var(--primary)"></i> ${phone}</a>` : '<span class="muted">—</span>'}</td>
      <td>${wa ? `<a href="https://wa.me/972${String(wa).replace(/[^0-9]/g, '').replace(/^0/, '')}" target="_blank"><i class="bi bi-whatsapp" style="color:#25d366"></i> WhatsApp</a>` : '<span class="muted">—</span>'}</td>
    `;
    tb.appendChild(tr);
  });
  document.getElementById('phone-stats').textContent = `מציג ${Math.min(list.length, 200)} מתוך ${list.length} ${list.length === ALL.length ? '' : `(סה"כ ${ALL.length})`}`;
}

function search(term) {
  term = (term || '').trim().toLowerCase();
  if (!term) return render(ALL);
  const filtered = ALL.filter(p => {
    const n = String(val(p, 'name') || '').toLowerCase();
    const ph = String(val(p, 'phone') || '').toLowerCase();
    return n.includes(term) || ph.includes(term);
  });
  render(filtered);
}

document.addEventListener('ma:data-ready', () => {
  ALL = (MA_DATA.phones || []).filter(p => val(p, 'name'));
  ALL.sort((a, b) => String(val(a, 'name')).localeCompare(String(val(b, 'name')), 'he'));
  render(ALL);
});

document.getElementById('phone-search').addEventListener('input', e => search(e.target.value));
</script>
</body>
</html>
