<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>גלריה · מעלה עמוס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>
.gallery-grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); }
.gallery-grid img { width:100%; height:200px; object-fit:cover; border-radius:var(--radius-sm); cursor:pointer; transition: transform .2s; }
.gallery-grid img:hover { transform: scale(1.03); }
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:1000; }
.lightbox.open { display:flex; }
.lightbox img { max-width:95vw; max-height:90vh; border-radius:8px; }
.lightbox .close { position:absolute; top:20px; left:20px; color:#fff; font-size:2rem; cursor:pointer; background:none; border:0; }
</style>
</head>
<body>

<main>

<h1><i class="bi bi-images" style="margin-left:8px"></i> גלריה</h1>
<p class="muted">תמונות מאירועי הקהילה</p>

<div id="gallery" class="gallery-grid">
  <div class="card skeleton" style="height:200px"></div>
  <div class="card skeleton" style="height:200px"></div>
  <div class="card skeleton" style="height:200px"></div>
  <div class="card skeleton" style="height:200px"></div>
</div>

</main>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <button class="close" onclick="event.stopPropagation();document.getElementById('lightbox').classList.remove('open')">×</button>
  <img id="lightbox-img" alt="">
</div>

<script src="assets/js/common.js"></script>
<script>
const FALLBACK_LIST = ['1.jpg','2.jpg','3.jpg','4.jpg','5.jpg','6.jpg'];

async function loadGallery() {
  const root = document.getElementById('gallery');
  let images = [];

  // 1. Try gallery.json (custom curated list)
  try {
    const r = await fetch('gallery.json');
    if (r.ok) images = await r.json();
  } catch {}

  // 2. Try data.json's gallery field
  if (!images.length && MA_DATA && MA_DATA.gallery) images = MA_DATA.gallery;

  // 3. Fallback - scan known images folder
  if (!images.length) {
    for (const f of FALLBACK_LIST) {
      try {
        const r = await fetch('images/' + f, { method: 'HEAD' });
        if (r.ok) images.push('images/' + f);
      } catch {}
    }
  }

  if (!images.length) {
    root.innerHTML = '<p class="muted text-center" style="grid-column:1/-1">טרם הועלו תמונות לגלריה</p>';
    return;
  }

  root.innerHTML = '';
  images.forEach(img => {
    const src = typeof img === 'string' ? img : (img.src || img.url);
    const caption = typeof img === 'object' ? (img.caption || img.title || '') : '';
    const i = document.createElement('img');
    i.src = src;
    i.alt = caption || 'תמונה מהקהילה';
    i.loading = 'lazy';
    i.onclick = () => {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    };
    root.appendChild(i);
  });
}

document.addEventListener('ma:data-ready', loadGallery);
</script>
</body>
</html>
