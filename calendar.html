<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>לוח שנה · מעלה עמוס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<main>

<h1><i class="bi bi-calendar3" style="margin-left:8px"></i> לוח שנה ושיעורים</h1>

<section class="section">
  <div class="section-title">
    <i class="bi bi-sun" style="font-size:1.5rem;color:var(--primary)"></i>
    <h2>זמני שבת השבוע</h2>
    <div class="line"></div>
  </div>
  <div id="shabbat" class="card">
    <p class="muted">טוען...</p>
  </div>
</section>

<section class="section">
  <div class="section-title">
    <i class="bi bi-calendar-event" style="font-size:1.5rem;color:var(--primary)"></i>
    <h2>חגים בקרוב</h2>
    <div class="line"></div>
  </div>
  <div id="holidays" class="grid">
    <div class="card skeleton" style="height:100px"></div>
  </div>
</section>

<section class="section">
  <div class="section-title">
    <i class="bi bi-book" style="font-size:1.5rem;color:var(--primary)"></i>
    <h2>שיעורי הקהילה</h2>
    <div class="line"></div>
  </div>
  <div class="card">
    <p class="muted">לוח שיעורים שבועי יתעדכן בקרוב. לפניות בנושא — דרך מזכירות הישוב.</p>
  </div>
</section>

</main>

<script src="assets/js/common.js"></script>
<script>
// Hebcal API — public, free, no key needed
const LAT = 31.575, LON = 35.310; // Maale Amos approx coordinates

async function loadShabbat() {
  const root = document.getElementById('shabbat');
  try {
    const url = `https://www.hebcal.com/shabbat?cfg=json&latitude=${LAT}&longitude=${LON}&tzid=Asia/Jerusalem&M=on&lg=he`;
    const r = await fetch(url);
    const d = await r.json();
    const items = d.items || [];
    const candle = items.find(i => i.category === 'candles');
    const havdalah = items.find(i => i.category === 'havdalah');
    const parsha = items.find(i => i.category === 'parashat');
    root.innerHTML = `
      <div style="display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
        ${parsha ? `<div class="text-center"><div class="muted">פרשת השבוע</div><div style="font-size:1.5rem;font-weight:700;color:var(--primary)">${MA.escape(parsha.hebrew || parsha.title)}</div></div>` : ''}
        ${candle ? `<div class="text-center"><div class="muted">הדלקת נרות</div><div style="font-size:1.5rem;font-weight:700;color:var(--primary)">${candle.title.match(/\d+:\d+/)?.[0] || ''}</div></div>` : ''}
        ${havdalah ? `<div class="text-center"><div class="muted">יציאת שבת</div><div style="font-size:1.5rem;font-weight:700;color:var(--primary)">${havdalah.title.match(/\d+:\d+/)?.[0] || ''}</div></div>` : ''}
      </div>
    `;
  } catch (e) {
    root.innerHTML = '<p class="muted text-center">לא ניתן לטעון את זמני השבת כרגע</p>';
  }
}

async function loadHolidays() {
  const root = document.getElementById('holidays');
  try {
    const year = new Date().getFullYear();
    const url = `https://www.hebcal.com/hebcal?cfg=json&v=1&maj=on&min=on&mod=on&nx=on&year=${year}&month=x&ss=off&mf=off&c=on&geo=pos&latitude=${LAT}&longitude=${LON}&tzid=Asia/Jerusalem&i=on&lg=he`;
    const r = await fetch(url);
    const d = await r.json();
    const today = new Date();
    const upcoming = (d.items || []).filter(i => i.category === 'holiday' && new Date(i.date) >= today).slice(0, 8);
    if (!upcoming.length) { root.innerHTML = '<p class="muted text-center">אין חגים קרובים</p>'; return; }
    root.innerHTML = '';
    upcoming.forEach(h => {
      const card = el('div', { class: 'card' });
      card.appendChild(el('h3', null, h.hebrew || h.title));
      card.appendChild(el('div', { class: 'badge badge-primary' }, MA.formatDate(h.date)));
      root.appendChild(card);
    });
  } catch (e) {
    root.innerHTML = '<p class="muted text-center">לא ניתן לטעון חגים כרגע</p>';
  }
}

loadShabbat();
loadHolidays();
</script>
</body>
</html>
