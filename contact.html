<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>צור קשר · מעלה עמוס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>
/* תיקון עמנואל: רקע כהה לעמוד פנייה — קל יותר לקריאה */
body { background: #0f1f1a; color: #e3e8e5; }
h1, h2, h3 { color: #fff !important; }
.card { background: #1a2e26; border-color: #2d4838; color: #e3e8e5; }
.form-group input, .form-group textarea, .form-group select { background: #0f1f1a; color: #fff; border-color: #2d4838; }
.form-group input:focus, .form-group textarea:focus { box-shadow: 0 0 0 3px rgba(201,165,68,0.2); }
.muted { color: #a4b3aa !important; }
.alert-info { background: #18342a; border-color: #2d6f5d; color: #c4d9cf; }
.alert-success { background: #1a3a20; border-color: #4caf50; color: #c0e0c4; }
.alert-error { background: #3a1818; border-color: #c44; color: #f0c8c8; }
</style>
</head>
<body>

<main>

<h1><i class="bi bi-envelope" style="margin-left:8px"></i> צור קשר</h1>
<p class="muted">פנייה למזכירות הישוב או הצעת תוכן לאתר</p>

<div class="grid" style="grid-template-columns: 2fr 1fr">
  <div class="card">
    <h2>טופס פנייה</h2>
    <form id="contact-form" novalidate>
      <div class="form-group">
        <label for="cf-name">שם מלא <span style="color:#f87171">*</span></label>
        <input type="text" id="cf-name" name="name" required maxlength="80">
      </div>
      <div class="form-group">
        <label for="cf-email">דוא"ל <span style="color:#f87171">*</span></label>
        <input type="email" id="cf-email" name="email" required maxlength="120">
      </div>
      <div class="form-group">
        <label for="cf-phone">טלפון</label>
        <input type="tel" id="cf-phone" name="phone" maxlength="20">
      </div>
      <div class="form-group">
        <label for="cf-subject">נושא הפנייה</label>
        <select id="cf-subject" name="subject">
          <option value="כללי">כללי</option>
          <option value="ביטחון">ביטחון</option>
          <option value="חינוך">חינוך</option>
          <option value="בתי כנסת">בתי כנסת</option>
          <option value="פנייה למועצה">פנייה למועצה</option>
          <option value="הצעה לאתר">הצעה לאתר</option>
          <option value="אחר">אחר</option>
        </select>
      </div>
      <div class="form-group">
        <label for="cf-message">תוכן הפנייה <span style="color:#f87171">*</span></label>
        <textarea id="cf-message" name="message" rows="6" required maxlength="3000"></textarea>
      </div>
      <input type="hidden" name="_subject" value="פנייה חדשה מהאתר">
      <input type="hidden" name="_template" value="table">
      <input type="text" name="_honey" style="display:none">
      <div id="cf-status"></div>
      <button type="submit" class="btn btn-accent" id="cf-submit">
        <i class="bi bi-send"></i> שליחה
      </button>
    </form>
  </div>

  <div>
    <div class="card mb-3">
      <h3><i class="bi bi-telephone" style="margin-left:6px"></i> מזכירות</h3>
      <p><a href="tel:+972556742853">055-674-2853</a></p>
      <p><a href="mailto:6742853@gmail.com">6742853@gmail.com</a></p>
    </div>
    <div class="card mb-3">
      <h3><i class="bi bi-whatsapp" style="margin-left:6px"></i> WhatsApp</h3>
      <p><a href="https://wa.me/972556742853?text=שלום,%20פנייה%20מהאתר" target="_blank">שלח הודעה</a></p>
    </div>
    <div class="alert alert-info">
      <strong>שעות מענה:</strong><br>
      ראשון-חמישי 9:00-17:00<br>
      שישי וערבי חג 9:00-13:00
    </div>
  </div>
</div>

</main>

<script src="assets/js/common.js"></script>
<script>
// Submission via FormSubmit (no backend needed, sends to mail)
const FORM = document.getElementById('contact-form');
const STATUS = document.getElementById('cf-status');
const SUBMIT = document.getElementById('cf-submit');

FORM.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Honeypot check
  if (FORM._honey.value) return;

  // Basic validation
  if (!FORM.name.value.trim() || !FORM.email.value.trim() || !FORM.message.value.trim()) {
    STATUS.innerHTML = '<div class="alert alert-error">נא למלא את כל השדות החובה</div>';
    return;
  }

  SUBMIT.disabled = true;
  SUBMIT.innerHTML = '<i class="bi bi-hourglass-split"></i> שולח...';
  STATUS.innerHTML = '';

  const data = new FormData(FORM);
  try {
    // FormSubmit endpoint — send to user mail
    const r = await fetch('https://formsubmit.co/ajax/6742853@gmail.com', {
      method: 'POST',
      headers: { 'Accept': 'application/json' },
      body: data,
    });
    const j = await r.json();
    if (j.success === 'true' || j.success === true) {
      STATUS.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle"></i> תודה! הפנייה התקבלה. ניצור איתך קשר בהקדם.</div>';
      FORM.reset();
    } else {
      throw new Error('Send failed');
    }
  } catch (err) {
    STATUS.innerHTML = '<div class="alert alert-error">שליחה נכשלה. אנא נסה שוב מאוחר יותר או צור קשר טלפוני.</div>';
  }
  SUBMIT.disabled = false;
  SUBMIT.innerHTML = '<i class="bi bi-send"></i> שליחה';
});
</script>
</body>
</html>
